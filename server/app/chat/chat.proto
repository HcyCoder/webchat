syntax = "proto3";

package chat;
option go_package = "./chat";

service Chat {
  rpc sendMessage(SendMessageRequest) returns (Message);
  rpc getMessages(GetMessagesRequest) returns (GetMessagesResponse);
  rpc recallMessage(RecallMessageRequest) returns (Empty);
  rpc getConversations(GetConversationsRequest) returns (GetConversationsResponse);
  rpc markRead(MarkReadRequest) returns (Empty);
}

message Empty {}

message Message {
  string id = 1;
  string chat_type = 2;
  string from_user = 3;
  string to_id = 4;
  string msg_type = 5;
  string content = 6;
  bool is_recalled = 7;
  int64 created_at = 8;
}

message SendMessageRequest {
  string chat_type = 1;
  string from_user = 2;
  string to_id = 3;
  string msg_type = 4;
  string content = 5;
}

message GetMessagesRequest {
  string conv_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message GetMessagesResponse {
  repeated Message messages = 1;
}

message RecallMessageRequest {
  string msg_id = 1;
  string user_id = 2;
}

message Conversation {
  string id = 1;
  string chat_type = 2;
  string target_id = 3;
  string target_name = 4;
  string target_avatar = 5;
  uint32 unread_count = 6;
  bool is_pinned = 7;
  bool is_muted = 8;
  int64 updated_at = 9;
}

message GetConversationsRequest {
  string user_id = 1;
}

message GetConversationsResponse {
  repeated Conversation conversations = 1;
}

message MarkReadRequest {
  string user_id = 1;
  string conv_id = 2;
}
